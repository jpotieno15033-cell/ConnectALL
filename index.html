<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City FM - Live Portal</title>
</head>
<body style="background-color: #0f1115; color: #ffffff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;">

    <div style="background: #1a1d24; padding: 40px 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #282c37; max-width: 380px; width: 100%; text-align: center; box-sizing: border-box;">
        
        <h1 style="font-size: 36px; margin: 0 0 5px 0; letter-spacing: 2px; font-weight: bold; color: #ffffff;">CITY FM</h1>
        <p id="statusMsg" style="color: #a0aec0; font-size: 14px; margin: 0 0 25px 0;">Sign in to connect to the broadcast</p>
        
        <div id="portalContent">
            
            <!-- LOGIN SECTION -->
            <div id="loginSection">
                <form onsubmit="processUserLogin(event)">
                    <div style="text-align: left; margin-bottom: 15px;">
                        <label style="display: block; color: #8a99ad; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Phone Number</label>
                        <input type="tel" id="login_phone" required placeholder="e.g. 0712345678" style="width: 100%; padding: 12px; background: #11141a; border: 1px solid #282c37; border-radius: 6px; color: white; font-size: 14px; box-sizing: border-box; outline: none;">
                    </div>
                    <div style="text-align: left; margin-bottom: 10px;">
                        <label style="display: block; color: #8a99ad; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Password</label>
                        <input type="password" id="login_pass" required style="width: 100%; padding: 12px; background: #11141a; border: 1px solid #282c37; border-radius: 6px; color: white; font-size: 14px; box-sizing: border-box; outline: none;">
                    </div>
                    <div style="text-align: right; margin-bottom: 25px;">
                        <a href="#" onclick="switchView('forgotSection')" style="color: #45f3ff; font-size: 12px; text-decoration: none;">Forgot Password?</a>
                    </div>
                    <button type="submit" style="display: block; width: 100%; padding: 16px 0; background-color: #00e676; color: #000000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;">
                        Stream Music
                    </button>
                </form>
                <p style="color: #a0aec0; font-size: 13px; margin: 25px 0 0 0;">Don't have an account? <a href="#" onclick="switchView('registerSection')" style="color: #45f3ff; text-decoration: none; font-weight: bold;">Register</a></p>
            </div>

            <!-- REGISTRATION SECTION -->
            <div id="registerSection" style="display: none;">
                <form onsubmit="handleFormSubmission(event, 'register')">
                    <div style="text-align: left; margin-bottom: 15px;">
                        <label style="display: block; color: #8a99ad; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Full Name</label>
                        <input type="text" id="reg_name" required style="width: 100%; padding: 12px; background: #11141a; border: 1px solid #282c37; border-radius: 6px; color: white; font-size: 14px; box-sizing: border-box; outline: none;">
                    </div>
                    <div style="text-align: left; margin-bottom: 15px;">
                        <label style="display: block; color: #8a99ad; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Phone Number</label>
                        <input type="tel" id="reg_phone" required placeholder="e.g. 0712345678" style="width: 100%; padding: 12px; background: #11141a; border: 1px solid #282c37; border-radius: 6px; color: white; font-size: 14px; box-sizing: border-box; outline: none;">
                    </div>
                    <div style="text-align: left; margin-bottom: 25px;">
                        <label style="display: block; color: #8a99ad; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Create Password</label>
                        <input type="password" id="reg_pass" required style="width: 100%; padding: 12px; background: #11141a; border: 1px solid #282c37; border-radius: 6px; color: white; font-size: 14px; box-sizing: border-box; outline: none;">
                    </div>
                    <button type="submit" style="display: block; width: 100%; padding: 16px 0; background-color: #45f3ff; color: #0b0c10; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;">
                        Register Account
                    </button>
                </form>
                <p style="color: #a0aec0; font-size: 13px; margin: 25px 0 0 0;">Already registered? <a href="#" onclick="switchView('loginSection')" style="color: #00e676; text-decoration: none; font-weight: bold;">Log In</a></p>
            </div>

            <!-- FORGOT PASSWORD SECTION -->
            <div id="forgotSection" style="display: none;">
                <form onsubmit="handleFormSubmission(event, 'recover')">
                    <div style="text-align: left; margin-bottom: 25px;">
                        <label style="display: block; color: #8a99ad; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Registered Phone Number</label>
                        <input type="tel" id="recover_phone" required placeholder="e.g. 0712345678" style="width: 100%; padding: 12px; background: #11141a; border: 1px solid #282c37; border-radius: 6px; color: white; font-size: 14px; box-sizing: border-box; outline: none;">
                    </div>
                    <button type="submit" style="display: block; width: 100%; padding: 16px 0; background-color: #e2e8f0; color: #0f1115; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px;">
                        Retrieve Password
                    </button>
                </form>
                <a href="#" onclick="switchView('loginSection')" style="color: #94a3b8; font-size: 13px; text-decoration: none; display: inline-block;">Back to Login</a>
            </div>
            
        </div>

    </div>

    <script>
        function switchView(id) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('forgotSection').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        // Bypasses PHP redirects entirely to lock down your exact URL link
        function processUserLogin(event) {
            event.preventDefault();
            var formData = new FormData();
            formData.append('action_type', 'login');
            formData.append('user_phone', document.getElementById('login_phone').value);
            formData.append('user_pass', document.getElementById('login_pass').value);

            fetch('process.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // Forces the same window frame tab to directly replace its content with your URL link asset
                    window.location.replace("https://stream.zeno.fm/cwlcweovje6uv");
                } else {
                    alert(data.message);
                }
            });
        }

        function handleFormSubmission(event, type) {
            event.preventDefault();
            var formData = new FormData();
            formData.append('action_type', type);
            if(type === 'register') {
                formData.append('reg_name', document.getElementById('reg_name').value);
                formData.append('reg_phone', document.getElementById('reg_phone').value);
                formData.append('reg_pass', document.getElementById('reg_pass').value);
            } else if(type === 'recover') {
                formData.append('recover_phone', document.getElementById('recover_phone').value);
            }

            fetch('process.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.status === 'registered') switchView('loginSection');
            });
        }
    </script>

</body>
</html>
